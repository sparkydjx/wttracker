# Deploy static build to GitHub Pages (Vite dist/).
#
# First time: GitHub → Settings → Pages → Source: GitHub Actions (required before deploy succeeds).
# Do not use actions/configure-pages here: it 404s until Pages is already enabled.
# The site is public; for real access control use Cloudflare Access, private Pages (paid), etc.
# Client-side-only "passwords" do not protect the shipped files.

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
